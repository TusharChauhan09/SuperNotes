function TweaksPanel({ tweaks, setTweaks }) {
  const row = (label, key, min, max, step=1, unit='') => (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
        <span style={{ fontSize:11, color:'#8a9e94' }}>{label}</span>
        <span style={{ fontSize:11, fontFamily:'Geist Mono,monospace', color:'#34d399' }}>{tweaks[key]}{unit}</span>

      <input type="range" min={min} max={max} step={step} value={tweaks[key]}
        onChange={e => {
          const val = Number(e.target.value);
          const next = {...tweaks, [key]: val};
          setTweaks(next);
          window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]: val } }, '*');
        }}
        style={{ width:'100%', accentColor:'#10b981', cursor:'pointer' }}/>
    </div>

    tags: ['cs', 'algorithms', 'complexity'],
    body: `## Overview

Sorting algorithms arrange elements in a specific order. Choosing the right one depends on data size, memory constraints, and whether stability matters.

## Merge Sort

**Time:** O(n log n) in all cases — best, average, worst.
**Space:** O(n) auxiliary — not in-place.

The array is recursively halved, then merged back in sorted order. The merge step is O(n) per level, and there are log n levels.

\`\`\`python
def merge_sort(arr):
    if len(arr) <= 1:
        return arr
    mid = len(arr) // 2
    left  = merge_sort(arr[:mid])
    right = merge_sort(arr[mid:])
    return merge(left, right)
\`\`\`

## Quick Sort

**Time:** O(n log n) average, O(n²) worst case.
**Space:** O(log n) call stack.

Chooses a pivot and partitions the array around it. Worst case hits with a sorted array and poor pivot selection.

> **Tip:** Use randomised pivot or median-of-three to avoid O(n²) in practice.

## Comparison

| Algorithm | Best | Avg | Worst | Space | Stable |
|---|---|---|---|---|---|
| Merge Sort | n log n | n log n | n log n | O(n) | ✓ |
| Quick Sort | n log n | n log n | n² | O(log n) | ✗ |
| Heap Sort | n log n | n log n | n log n | O(1) | ✗ |

function FileSidebar({ activeNote, setActiveNote, openTabs, setOpenTabs, width=220 }) {
  const [openFolders, setOpenFolders] = useState(new Set(['f-cs']));
  const [search, setSearch] = useState('');
  const searchRef = useRef(null);

  const toggleFolder = id => setOpenFolders(s => {
    const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n;
  });

  const openNote = (note) => {
    setActiveNote(note.id);
    if (!openTabs.find(t=>t.id===note.id)) {
      setOpenTabs(ts=>[...ts, { id:note.id, name:note.name }]);
    }
  };

  const renderFolder = (folder, depth=0) => {
    const isOpen = openFolders.has(folder.id);
    const pl = 8 + depth*14;
    return (
      <div key={folder.id}>
        <div onClick={()=>toggleFolder(folder.id)}
          style={{ display:'flex', alignItems:'center', gap:5, padding:`3px 8px 3px ${pl}px`,
            cursor:'pointer', borderRadius:4, fontSize:12.5, color:C.fg2,
            background:'transparent', userSelect:'none' }}
          onMouseEnter={e=>e.currentTarget.style.background=C.s3}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <Ico n={isOpen?'chevronD':'chevron'} size={11} color={C.fg3} style={{flexShrink:0}}/>
          <Ico n="folder" size={12} color={isOpen?C.accentLt:C.fg3} style={{flexShrink:0}}/>
          <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{folder.name}</span>
        </div>
        {isOpen && (
          <div>
            {folder.sub?.map(s=>renderFolder(s, depth+1))}
            {folder.notes?.filter(n=>!search||n.name.toLowerCase().includes(search.toLowerCase())).map(note=>(
              <div key={note.id} onClick={()=>openNote(note)}
                style={{ display:'flex', alignItems:'center', gap:5, padding:`3px 8px 3px ${pl+16}px`,
                  cursor:'pointer', borderRadius:4, fontSize:12.5,
                  color: activeNote===note.id ? C.accentLt : C.fg2,
                  background: activeNote===note.id ? 'rgba(16,185,129,0.12)' : 'transparent',
                  borderLeft: activeNote===note.id ? `2px solid ${C.accent}` : '2px solid transparent',
                  userSelect:'none' }}
                onMouseEnter={e=>{ if(activeNote!==note.id) e.currentTarget.style.background=C.s3; }}
                onMouseLeave={e=>{ if(activeNote!==note.id) e.currentTarget.style.background='transparent'; }}>
                <Ico n="file" size={11} color={activeNote===note.id?C.accent:C.fg3} style={{flexShrink:0}}/>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{note.name}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ width, background:C.s1, borderRight:`1px solid ${C.border}`,
      display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden', transition:'width 0.05s' }}>
      {/* Header */}
      <div style={{ padding:'10px 10px 6px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase',
          color:C.fg3, marginBottom:7 }}>Vault</div>
        {/* Search */}

          border:`1px solid ${C.border}`, borderRadius:6, padding:'5px 9px' }}>
          <Ico n="search" size={12} color={C.fg3}/>

            style={{ background:'transparent', border:'none', outline:'none', width:'100%',
              fontSize:12, color:C.fg1, fontFamily:'Geist,sans-serif' }}/>
        </div>
      </div>
      {/* Tree */}

  );
}

function NoteEditor({ noteId, showAI, setShowAI, fontSize=16 }) {
  const note = NOTE_CONTENT[noteId] || NOTE_CONTENT['n-sort'];
  const [wordCount] = useState(() => note.body.split(/\s+/).length);

  // Parse markdown-ish into JSX for display
  const renderBody = (text) => {
    const lines = text.split('\n');
    const out = [];
    let inCode = false, codeLines = [];

    lines.forEach((line, i) => {
      if (line.startsWith('```')) {
        if (!inCode) { inCode = true; codeLines = []; return; }
        out.push(<pre key={`code-${i}`}>{codeLines.join('\n')}</pre>);
        inCode = false; codeLines = []; return;
      }
      if (inCode) { codeLines.push(line); return; }

      if (line.startsWith('## '))       out.push(<h2 key={i}>{line.slice(3)}</h2>);
      else if (line.startsWith('### ')) out.push(<h3 key={i}>{line.slice(4)}</h3>);
      else if (line.startsWith('> '))   out.push(<blockquote key={i}>{line.slice(2)}</blockquote>);
      else if (line.startsWith('- ') || line.startsWith('**')) {
        const rich = line.replace(/\*\*(.*?)\*\*/g, (_,m)=>`<strong>${m}</strong>`)
                         .replace(/`(.*?)`/g, (_,m)=>`<code>${m}</code>`)
                         .replace(/^- /,'');
        out.push(<p key={i} dangerouslySetInnerHTML={{__html: rich}}/>);
      }
      else if (line.startsWith('| ')) {
        // simple table row skip
      }
      else if (line.trim()) {
        const rich = line.replace(/\*\*(.*?)\*\*/g, (_,m)=>`<strong>${m}</strong>`)
                         .replace(/`(.*?)`/g, (_,m)=>`<code>${m}</code>`);
        out.push(<p key={i} dangerouslySetInnerHTML={{__html: rich}}/>);
      }
    });
    return out;
  };

  return (
    <div style={{ flex:1, display:'flex', minWidth:0, position:'relative' }}>
      <div style={{ flex:1, overflowY:'auto', display:'flex', justifyContent:'center' }}>
        <div style={{ width:'100%', maxWidth:720, padding:'48px 56px 80px' }}>
          {/* Tags */}
          <div style={{ marginBottom:20, display:'flex', gap:4, flexWrap:'wrap' }}>
            {note.tags.map(t=><span key={t} className="tag">#{t}</span>)}

          <h1 style={{ fontSize:36, fontWeight:700, color:C.fg1, letterSpacing:'-0.025em',

          {/* Body */}
          <div className="prose-editor" style={{ fontSize }}>{renderBody(note.body)}</div>
        </div>
      </div>

      {/* AI Refine panel */}
      {showAI && (
        <div style={{ width:340, background:C.s1, borderLeft:`1px solid ${C.borderMid}`,
          display:'flex', flexDirection:'column', flexShrink:0 }}>
          <div style={{ padding:'14px 16px', borderBottom:`1px solid ${C.border}`,
            display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <Ico n="wand" size={14} color={C.accentLt}/>
              <span style={{ fontSize:13, fontWeight:600, color:C.fg1 }}>AI Refinement</span>
            </div>
            <button onClick={()=>setShowAI(false)} style={{ background:'transparent', border:'none',
              cursor:'pointer', padding:4, borderRadius:4, color:C.fg3 }}>

            </button>
          </div>
          <div style={{ flex:1, padding:'16px', overflowY:'auto' }}>

              Gemini will restructure your notes into clear study material.
            </div>
            <div style={{ background:'rgba(16,185,129,0.06)', border:`1px solid ${C.borderMid}`,
              borderRadius:8, padding:'12px 14px', marginBottom:12 }}>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase',
                color:C.accent, marginBottom:8 }}>Refined output</div>

                <br/><br/>
                <strong style={{color:C.fg1}}>Quick Sort</strong> — Partition-based, O(n log n) avg.

              </div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button style={{ flex:1, padding:'7px', background:C.accent, border:'none',

              color: ctrl.on ? C.fg2 : '#fca5a5', minWidth:76, transition:'all 0.12s' }}>
            <Ico n={ctrl.icon} size={18} color={ctrl.on?C.fg2:'#fca5a5'}/>
            <span style={{ fontSize:10, fontFamily:'Geist,sans-serif', fontWeight:500 }}>{ctrl.label}</span>
          </button>
        ))}
        <button onClick={onLeave}
          style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.3)',
            borderRadius:10, padding:'8px 18px', cursor:'pointer', color:'#fca5a5', minWidth:76 }}>
          <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fca5a5" strokeWidth={1.75} strokeLinecap="round">
            <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.42 19.42 0 013.43 9.19 19.79 19.79 0 01.36.5 2 2 0 012.34 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.32 9.9"/>
          </svg>
          <span style={{ fontSize:10, fontFamily:'Geist,sans-serif', fontWeight:500 }}>Leave</span>
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   ROOT APP
══════════════════════════════════════ */
function App() {
  const [view, setView] = useState('notes');
  const [activeNote, setActiveNote] = useState('n-sort');
  const [openTabs, setOpenTabs] = useState(INITIAL_TABS);
  const [showAI, setShowAI] = useState(false);
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Sidebar resize
  const [sidebarWidth, setSidebarWidth] = useState(tweaks.sidebarWidth);
  const dragging = useRef(false);
  const dragStart = useRef(0);
  const widthStart = useRef(0);

  // Sync sidebarWidth from tweaks panel
  useEffect(() => { setSidebarWidth(tweaks.sidebarWidth); }, [tweaks.sidebarWidth]);

  // Drag handle logic
  const onDragStart = useCallback((e) => {
    dragging.current = true;
    dragStart.current = e.clientX;
    widthStart.current = sidebarWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }, [sidebarWidth]);

  useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      const delta = e.clientX - dragStart.current;
      const next = Math.max(0, Math.min(480, widthStart.current + delta));
      setSidebarWidth(next); // pure drag — no snapping
    };
    const onUp = () => {
      if (!dragging.current) return;
      dragging.current = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const closeTab = (id, e) => {
    e.stopPropagation();
    const next = openTabs.filter(t=>t.id!==id);
    setOpenTabs(next);
    if (activeNote===id) setActiveNote(next.length?next[next.length-1].id:null);
  };

  const bloom = tweaks.gradientBloom / 100;
  const accent = tweaks.accentOpacity / 100;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden',
      background: C.base,
      backgroundImage: `radial-gradient(ellipse 80% 35% at 50% -10%, rgba(16,185,129,${bloom}) 0%, transparent 60%)` }}>

      <Ribbon view={view} setView={setView}/>

      {/* Notes sidebar + drag handle */}
      {view === 'notes' && (
        <>
          {sidebarWidth > 0 && (
            <FileSidebar activeNote={activeNote} setActiveNote={setActiveNote}
              openTabs={openTabs} setOpenTabs={setOpenTabs} width={sidebarWidth}/>
          )}
          {/* Drag handle — always present in notes view */}
          <div onMouseDown={onDragStart}
            style={{ width:5, flexShrink:0, cursor:'col-resize', position:'relative',
              background:'transparent', zIndex:10 }}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(16,185,129,0.22)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{ position:'absolute', top:'50%', left:'50%',
              transform:'translate(-50%,-50%)',
              width:3, height:28, borderRadius:2, background:'rgba(16,185,129,0.18)' }}/>
          </div>
        </>
      )}

      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* Tab bar */}
        {view === 'notes' && (
          <div style={{ display:'flex', alignItems:'stretch', height:36,
            borderBottom:`1px solid ${C.border}`, background:C.s1,
            overflowX:'auto', flexShrink:0 }}>
            {openTabs.map(tab=>(
              <div key={tab.id} onClick={()=>setActiveNote(tab.id)}
                style={{ display:'flex', alignItems:'center', gap:6, padding:'0 14px',
                  cursor:'pointer', fontSize:12.5, flexShrink:0,
                  borderRight:`1px solid ${C.border}`,
                  color: activeNote===tab.id ? C.fg1 : C.fg3,
                  background: activeNote===tab.id ? C.base : 'transparent',
                  borderBottom: activeNote===tab.id ? `2px solid ${C.accent}` : '2px solid transparent',
                  transition:'all 0.1s' }}>
                <Ico n="file" size={11} color={activeNote===tab.id?C.accent:C.fg3}/>
                <span>{tab.name}</span>
                <button onClick={e=>closeTab(tab.id,e)}
                  style={{ background:'transparent', border:'none', cursor:'pointer',
                    padding:'1px 2px', borderRadius:3, color:C.fg3, display:'flex',
                    marginLeft:2, lineHeight:1 }}>
                  <Ico n="x" size={10}/>
                </button>
              </div>
            ))}
          </div>
        )}

        {/* Screen content */}
        <div style={{ flex:1, display:'flex', minHeight:0 }}>
          {view==='notes' && (
            <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
              <EditorToolbar onAI={()=>setShowAI(v=>!v)}/>
              {activeNote
                ? <NoteEditor noteId={activeNote} showAI={showAI} setShowAI={setShowAI} fontSize={tweaks.fontSize}/>
                : <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center',
                    color:C.fg3, fontSize:13 }}>Open a note to start editing</div>
              }
            </div>
          )}
          {view==='clubs'   && <ClubsScreen/>}
          {view==='room'    && <RoomScreen onLeave={()=>setView('clubs')}/>}
          {view==='profile' && <ProfileScreen/>}
        </div>
      </div>

      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
